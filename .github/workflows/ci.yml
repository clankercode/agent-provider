name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:packages
      # Branded Google Chrome >= 137 removed --load-extension (and the
      # runner image ships branded Chrome), which the extension smoke test
      # needs. Run it against a pinned real Chromium build instead.
      - name: Install Chromium for extension smoke test
        run: npx --yes @puppeteer/browsers install chromium@1666776 --path "$RUNNER_TEMP/browsers"
      - name: Chrome extension smoke
        run: |
          CHROMIUM_PATH="$RUNNER_TEMP/browsers/chromium/linux-1666776/chrome-linux/chrome"
          export CHROMIUM_PATH
          xvfb-run -a npm run test:browser
      - name: Firefox extension smoke and lint
        run: |
          FIREFOX_PATH="$(command -v firefox)"
          export FIREFOX_PATH
          npm run test:firefox
      - run: npm sbom --sbom-format cyclonedx > agent-provider.sbom.json
      - run: npm run package:stores
      - uses: actions/upload-artifact@v4
        with:
          name: agent-provider-builds
          path: |
            apps/extension/.output/**
            agent-provider.sbom.json
            release/**

  safari-best-effort:
    continue-on-error: true
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:packages
      - run: npm run build -w agent-provider-extension -- --browser safari
