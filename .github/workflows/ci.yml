name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:packages
      - name: Chrome extension smoke
        run: |
          CHROMIUM_PATH="$(command -v google-chrome || command -v chromium)"
          export CHROMIUM_PATH
          xvfb-run -a npm run test:browser
      - name: Firefox extension smoke and lint
        run: |
          FIREFOX_PATH="$(command -v firefox)"
          export FIREFOX_PATH
          npm run test:firefox
      - run: npm sbom --sbom-format cyclonedx > agent-provider.sbom.json
      - run: npm run package:stores
      - uses: actions/upload-artifact@v4
        with:
          name: agent-provider-builds
          path: |
            apps/extension/.output/**
            agent-provider.sbom.json
            release/**

  safari-best-effort:
    continue-on-error: true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:packages
      - run: npm run build -w agent-provider-extension -- --browser safari
