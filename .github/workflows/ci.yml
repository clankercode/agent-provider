name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm sbom --sbom-format cyclonedx > agent-provider.sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-provider-builds
          path: |
            apps/extension/.output/**
            agent-provider.sbom.json

  safari-best-effort:
    continue-on-error: true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:packages
      - run: npm run build -w agent-provider-extension -- --browser safari
